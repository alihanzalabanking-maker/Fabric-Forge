kind = "web"
previewPath = "/"
title = "RM Apparels"
version = "1.0.0"
id = "artifacts/rm-apparels"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26175

[services.development]
run = "pnpm --filter @workspace/rm-apparels run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rm-apparels", "run", "build" ]
publicDir = "artifacts/rm-apparels/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26175"
BASE_PATH = "/"
